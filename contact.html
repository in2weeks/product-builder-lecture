<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의 | Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    <div class="container contact-container">
        <a href="index.html" class="back-link">← 메인으로</a>
        <h1>제휴 문의</h1>
        <p class="contact-desc">제휴 및 협력 관련 문의를 남겨주시면 빠르게 답변드리겠습니다.</p>

        <form id="contact-form" action="https://formspree.io/f/mnjggjql" method="POST">
            <div class="form-group">
                <label for="company">회사명 <span class="required">*</span></label>
                <input type="text" id="company" name="company" placeholder="회사명을 입력해주세요" required>
            </div>
            <div class="form-group">
                <label for="name">담당자명 <span class="required">*</span></label>
                <input type="text" id="name" name="name" placeholder="담당자 이름을 입력해주세요" required>
            </div>
            <div class="form-group">
                <label for="email">이메일 <span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="답변 받으실 이메일을 입력해주세요" required>
            </div>
            <div class="form-group">
                <label for="phone">연락처</label>
                <input type="tel" id="phone" name="phone" placeholder="연락처를 입력해주세요 (선택)">
            </div>
            <div class="form-group">
                <label for="message">문의 내용 <span class="required">*</span></label>
                <textarea id="message" name="message" rows="5" placeholder="제휴 관련 문의 내용을 자세히 작성해주세요" required></textarea>
            </div>
            <button type="submit" id="submit-btn">문의 보내기</button>
        </form>

        <div id="success-msg" class="success-msg hidden">
            ✅ 문의가 성공적으로 접수되었습니다. 빠른 시일 내에 답변드리겠습니다.
        </div>
    </div>
    <script src="main.js"></script>
    <script src="contact.js"></script>
</body>
</html>
