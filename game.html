<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            border: 3px solid #4a90e2;
            border-radius: 8px;
            display: block;
        }
        #hint {
            color: #aaa;
            font-size: 13px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="400" height="550"></canvas>
    <div id="hint">스페이스바 또는 클릭으로 조작</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const W = canvas.width;
        const H = canvas.height;

        // ── 상수 ──────────────────────────────────────────
        const GRAVITY      = 0.4;
        const JUMP_FORCE   = -8;
        const PIPE_WIDTH   = 52;
        const PIPE_GAP     = 150;
        const PIPE_SPEED   = 2.5;
        const PIPE_INTERVAL = 90; // 프레임

        // ── 상태 ──────────────────────────────────────────
        let bird, pipes, score, frame, state;
        // state: 'waiting' | 'playing' | 'dead'

        function init() {
            bird = { x: 90, y: H / 2, vy: 0, r: 16 };
            pipes = [];
            score = 0;
            frame = 0;
            state = 'waiting';
        }

        // ── 입력 ──────────────────────────────────────────
        function flap() {
            if (state === 'waiting') {
                state = 'playing';
                bird.vy = JUMP_FORCE;
            } else if (state === 'playing') {
                bird.vy = JUMP_FORCE;
            } else if (state === 'dead') {
                init();
            }
        }

        document.addEventListener('keydown', e => {
            if (e.code === 'Space') { e.preventDefault(); flap(); }
        });
        canvas.addEventListener('click', flap);

        // ── 파이프 생성 ───────────────────────────────────
        function spawnPipe() {
            const minTop = 60;
            const maxTop = H - PIPE_GAP - 60;
            const topH = Math.random() * (maxTop - minTop) + minTop;
            pipes.push({ x: W, topH, passed: false });
        }

        // ── 충돌 검사 (원 vs 사각형) ──────────────────────
        function hits(pipe) {
            const bx = bird.x, by = bird.y, br = bird.r - 3;
            const topRect  = { x: pipe.x, y: 0,               w: PIPE_WIDTH, h: pipe.topH };
            const botRect  = { x: pipe.x, y: pipe.topH + PIPE_GAP, w: PIPE_WIDTH, h: H };

            return colCircleRect(bx, by, br, topRect) ||
                   colCircleRect(bx, by, br, botRect);
        }

        function colCircleRect(cx, cy, cr, r) {
            const nearX = Math.max(r.x, Math.min(cx, r.x + r.w));
            const nearY = Math.max(r.y, Math.min(cy, r.y + r.h));
            const dx = cx - nearX, dy = cy - nearY;
            return dx * dx + dy * dy < cr * cr;
        }

        // ── 업데이트 ──────────────────────────────────────
        function update() {
            if (state !== 'playing') return;

            frame++;

            // 새 물리
            bird.vy += GRAVITY;
            bird.y  += bird.vy;

            // 파이프 생성
            if (frame % PIPE_INTERVAL === 0) spawnPipe();

            // 파이프 이동 & 점수
            for (const p of pipes) {
                p.x -= PIPE_SPEED;
                if (!p.passed && p.x + PIPE_WIDTH < bird.x) {
                    p.passed = true;
                    score++;
                }
            }
            pipes = pipes.filter(p => p.x + PIPE_WIDTH > 0);

            // 충돌 — 천장/바닥
            if (bird.y - bird.r < 0 || bird.y + bird.r > H) {
                state = 'dead';
                return;
            }

            // 충돌 — 파이프
            for (const p of pipes) {
                if (hits(p)) { state = 'dead'; return; }
            }
        }

        // ── 그리기 헬퍼 ───────────────────────────────────
        function drawPipe(x, topH) {
            const cap = 10; // 파이프 캡 두께

            // 몸통
            ctx.fillStyle = '#4caf50';
            ctx.fillRect(x, 0, PIPE_WIDTH, topH - cap);
            ctx.fillRect(x, topH + PIPE_GAP + cap, PIPE_WIDTH, H);

            // 캡 (입구)
            ctx.fillStyle = '#66bb6a';
            ctx.fillRect(x - 4, topH - cap, PIPE_WIDTH + 8, cap);
            ctx.fillRect(x - 4, topH + PIPE_GAP, PIPE_WIDTH + 8, cap);

            // 테두리
            ctx.strokeStyle = '#2e7d32';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(x, 0, PIPE_WIDTH, topH - cap);
            ctx.strokeRect(x, topH + PIPE_GAP + cap, PIPE_WIDTH, H);
            ctx.strokeRect(x - 4, topH - cap, PIPE_WIDTH + 8, cap);
            ctx.strokeRect(x - 4, topH + PIPE_GAP, PIPE_WIDTH + 8, cap);
        }

        function drawBird() {
            const x = bird.x, y = bird.y, r = bird.r;
            const angle = Math.min(Math.max(bird.vy * 3, -25), 70) * Math.PI / 180;

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            // 몸통
            ctx.fillStyle = '#fdd835';
            ctx.beginPath();
            ctx.ellipse(0, 0, r, r * 0.85, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#f9a825';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 날개
            ctx.fillStyle = '#ffee58';
            ctx.beginPath();
            ctx.ellipse(-3, 4, r * 0.55, r * 0.3, -0.4, 0, Math.PI * 2);
            ctx.fill();

            // 눈
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(6, -4, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(7.5, -4, 2.5, 0, Math.PI * 2);
            ctx.fill();

            // 부리
            ctx.fillStyle = '#ff7043';
            ctx.beginPath();
            ctx.moveTo(r - 2, 0);
            ctx.lineTo(r + 7, -3);
            ctx.lineTo(r + 7,  3);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        function drawBackground() {
            // 하늘 그라디언트
            const sky = ctx.createLinearGradient(0, 0, 0, H);
            sky.addColorStop(0, '#87ceeb');
            sky.addColorStop(1, '#b0e0ff');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, W, H);

            // 구름 (정적)
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            drawCloud(60,  70, 40);
            drawCloud(220, 110, 55);
            drawCloud(340,  55, 35);

            // 땅
            ctx.fillStyle = '#8bc34a';
            ctx.fillRect(0, H - 20, W, 20);
            ctx.fillStyle = '#7cb342';
            ctx.fillRect(0, H - 20, W, 5);
        }

        function drawCloud(x, y, size) {
            ctx.beginPath();
            ctx.arc(x,          y,          size * 0.5, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y - size * 0.1, size * 0.4, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y,          size * 0.35, 0, Math.PI * 2);
            ctx.arc(x + size * 0.4, y + size * 0.2, size * 0.35, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawScore() {
            ctx.fillStyle = 'rgba(0,0,0,0.35)';
            ctx.fillRect(W / 2 - 45, 14, 90, 36);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 26px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(score, W / 2, 42);
        }

        function drawOverlay(title, sub) {
            ctx.fillStyle = 'rgba(0,0,0,0.45)';
            ctx.fillRect(0, 0, W, H);

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(title, W / 2, H / 2 - 20);

            ctx.font = '17px Arial';
            ctx.fillStyle = '#ddd';
            ctx.fillText(sub, W / 2, H / 2 + 18);
        }

        function drawGameOver() {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, W, H);

            // 패널
            ctx.fillStyle = 'rgba(255,255,255,0.95)';
            ctx.beginPath();
            ctx.roundRect(W / 2 - 120, H / 2 - 90, 240, 200, 14);
            ctx.fill();

            ctx.fillStyle = '#e53e3e';
            ctx.font = 'bold 32px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Game Over', W / 2, H / 2 - 45);

            ctx.fillStyle = '#555';
            ctx.font = '16px Arial';
            ctx.fillText(`점수: ${score}`, W / 2, H / 2 - 10);

            // 다시 시작 버튼
            ctx.fillStyle = '#4a90e2';
            ctx.beginPath();
            ctx.roundRect(W / 2 - 80, H / 2 + 20, 160, 46, 10);
            ctx.fill();

            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px Arial';
            ctx.fillText('다시 시작', W / 2, H / 2 + 49);
        }

        // ── 메인 루프 ──────────────────────────────────────
        function draw() {
            drawBackground();

            for (const p of pipes) drawPipe(p.x, p.topH);

            drawBird();
            drawScore();

            if (state === 'waiting') {
                drawOverlay('Flappy Bird', '스페이스바 또는 클릭으로 시작');
            } else if (state === 'dead') {
                drawGameOver();
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        init();
        loop();
    </script>
</body>
</html>
